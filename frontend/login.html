<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Gerador de Certificados</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #111318;
      --surface: #1c1f26;
      --border:  #2e3240;
      --primary: #4f8ef7;
      --primary-h: #3b7de8;
      --danger:  #f05252;
      --text:    #e8eaf0;
      --muted:   #8b90a0;
      --radius:  10px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      font-size: 36px;
      line-height: 1;
      margin-bottom: 8px;
    }
    .logo-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .logo-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }
    input:focus { border-color: var(--primary); }

    .btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      transition: background .15s;
      margin-top: 4px;
    }
    .btn:hover:not(:disabled) { background: var(--primary-h); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .error-msg {
      color: var(--danger);
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📜</div>
      <div class="logo-title">Gerador de Certificados</div>
      <div class="logo-sub">Faça login para continuar</div>
    </div>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button class="btn" type="submit" id="btnLogin">Entrar</button>
      <p class="error-msg" id="errorMsg"></p>
    </form>
  </div>

  <script src="/static/js/auth.js"></script>
</body>
</html>
